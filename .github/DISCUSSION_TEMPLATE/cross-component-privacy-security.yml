title: "[Privacy & Security] Your topic in one line"
body:
  - type: markdown
    attributes:
      value: |
        Use this template for system-level privacy or security concerns that arise from combining multiple TF outputs.
        For ZKP internals or credential revocation specifics, please use the Credentials TF repo instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is the system-level privacy or security concern?
    validations:
      required: true
  - type: checkboxes
    id: components
    attributes:
      label: Which components interact here?
      options:
        - label: Credentials + Trust Task Protocols
        - label: Credentials + Agent Names
        - label: R-Cards + Trust Task Protocols
        - label: R-Cards + Agent Names
        - label: Other combination
  - type: checkboxes
    id: nature
    attributes:
      label: Nature of the concern
      options:
        - label: Correlation risk
        - label: Key management across the stack
        - label: Privacy boundary at an integration point
        - label: Other
  - type: textarea
    id: assumption
    attributes:
      label: Current design assumption
      description: What does the current architecture assume here, if anything?
    validations:
      required: false
  - type: textarea
    id: mitigation
    attributes:
      label: Proposed mitigation or open question
      description: What should the WG consider or decide?
    validations:
      required: true