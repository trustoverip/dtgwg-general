title: "[Q&A] Your question in one line"
body:
  - type: markdown
    attributes:
      value: |
        Use this template to ask a question about DTG — technology, process, terminology, or membership.
        Before posting, check the [DTG Glossary](https://lf-toip.atlassian.net/wiki/spaces/HOME/pages/442073089/DTG+Glossary) and existing discussions.
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What do you want to know? Be as specific as you can.
    validations:
      required: true
  - type: textarea
    id: background
    attributes:
      label: Background
      description: What have you already read or tried? This helps avoid duplicate answers.
    validations:
      required: false
  - type: checkboxes
    id: area
    attributes:
      label: Relevant area
      description: Check any that apply.
      options:
        - label: Credentials (PHCs, VRCs, ZKPs)
        - label: R-Cards
        - label: Trust Task Protocols
        - label: Agent Names
        - label: Interaction Architecture
        - label: Governance
        - label: Membership / Process
        - label: Other