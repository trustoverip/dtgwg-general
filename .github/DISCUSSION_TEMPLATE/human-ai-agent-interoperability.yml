title: "[Human & AI] Your topic in one line"
body:
  - type: markdown
    attributes:
      value: |
        Use this template to discuss architectural questions at the boundary between human and AI agents in the DTG.
        This covers agentic delegation, agent naming in trust flows, and human governance of AI-held credentials.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is the question, concern, proposal, or discussion point of interoperability between human and AI agents?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Relevant DTG context
      description: Which aspects of the DTG design does this involve? e.g. agent naming, credential delegation, trust task protocols, wallet behavior.
    validations:
      required: true
  - type: textarea
    id: governance
    attributes:
      label: The human governance dimension
      description: How does human oversight, consent, or accountability apply here?
    validations:
      required: false
  - type: textarea
    id: technical
    attributes:
      label: The technical dimension
      description: Which specs or components need to address this?
    validations:
      required: false
  - type: textarea
    id: proposal
    attributes:
      label: Open question or proposal
      description: What does the WG need to decide or design to handle this?
    validations:
      required: true